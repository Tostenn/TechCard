name: Deploy to GitHub Pages

on:
  push:
    branches: [ doc ] # Déclenchement sur ta branche de travail

permissions:
  contents: write # pour permettre à l'action de pousser sur gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm ci

      - name: Build Site 🏗️
        run: npx vite build --outDir build --emptyOutDir 

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build 
          branch: gh-pages
          clean: true