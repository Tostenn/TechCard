name: Release and CDN Sync

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install and Build 🏗️
        run: |
          npm install
          npm run build:lib

      # Étape de nettoyage : on ne garde que .js et .mjs
      - name: Clean dist folder 🧹
        run: |
          find dist -type f ! -name "*.js" ! -name "*.mjs" -delete
          # Supprime aussi les dossiers vides s'il y en a (comme assets/)
          find dist -type d -empty -delete

      - name: Commit Dist to Main 📦
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # On force l'ajout au cas où dist/ est dans le .gitignore
          git add -f dist/ 
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "build: update production files (.js, .mjs) [skip ci]"
            git push origin main
          else
            echo "No changes in dist to commit"
          fi